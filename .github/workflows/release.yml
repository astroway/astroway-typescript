name: release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - run: npm test
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/**/*
      - run: |
          # Detect prerelease (alpha/beta/rc/etc) and use --tag accordingly.
          # npm refuses prerelease publish without explicit --tag (would land on @latest).
          VERSION=$(node -p "require('./package.json').version")
          if echo "$VERSION" | grep -qE -- "-(alpha|beta|rc|next|preview)"; then
            TAG=$(echo "$VERSION" | sed -E "s/.*-(alpha|beta|rc|next|preview).*/\1/")
            echo "Publishing $VERSION to npm dist-tag: $TAG"
            npm publish --provenance --access public --tag "$TAG"
          else
            echo "Publishing stable $VERSION to dist-tag: latest"
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
