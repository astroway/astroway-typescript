name: ci

on:
  workflow_dispatch:      # manual runs only — push trigger disabled until SDK code is ready
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm ci
      - run: npm run sync-spec
      - run: npm run build
      - run: npm test
